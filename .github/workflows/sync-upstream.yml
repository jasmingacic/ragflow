name: Sync Upstream

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT (classic) with `repo` + `workflow` scopes; GITHUB_TOKEN can't
          # update workflow files even with `permissions:`. Stored as repo secret.
          token: ${{ secrets.SYNC_PAT }}

      - name: Sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/infiniflow/ragflow.git
          git fetch upstream
          git checkout main

          if ! git merge upstream/main --no-edit; then
            echo "Merge conflict detected, resolving by keeping our fork's changes for fork-specific files"

            # For helm chart files, keep ours (fork maintains its own values)
            git checkout --ours helm/values.yaml helm/Chart.yaml 2>/dev/null || true

            # For deps, keep ours (fork uses PyPI/GitHub instead of Chinese mirrors)
            git checkout --ours pyproject.toml uv.lock 2>/dev/null || true

            # For workflows we added, keep ours
            git checkout --ours .github/workflows/arc-runner-test.yml 2>/dev/null || true
            git checkout --ours .github/workflows/release-build.yml 2>/dev/null || true
            git checkout --ours .github/workflows/sync-upstream.yml 2>/dev/null || true

            # Stage the files we resolved as "ours" so they're no longer in the conflict list
            git add helm/values.yaml helm/Chart.yaml pyproject.toml uv.lock \
              .github/workflows/arc-runner-test.yml \
              .github/workflows/release-build.yml \
              .github/workflows/sync-upstream.yml 2>/dev/null || true

            # For any remaining conflicts, take upstream
            REMAINING=$(git diff --name-only --diff-filter=U)
            if [ -n "$REMAINING" ]; then
              echo "Taking upstream for remaining conflicts:"
              echo "$REMAINING"
              echo "$REMAINING" | xargs git checkout --theirs --
              echo "$REMAINING" | xargs git add --
            fi

            git commit -m "Merge upstream/main with conflict resolution"
          fi

          git push origin main
