name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Release Image
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Patch Dockerfile for ODBC compatibility
        run: |
          sed -i 's|packages.microsoft.com/config/ubuntu/22.04|packages.microsoft.com/config/ubuntu/24.04|g' Dockerfile
          sed -i 's|msodbcsql17|msodbcsql18|g' Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-chart:
    name: Update Helm Chart
    runs-on: arc-runner-set
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm values and Chart
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          TAG=${GITHUB_REF#refs/tags/}

          # Update image repository and tag in values.yaml
          sed -i 's|repository: infiniflow/ragflow|repository: ghcr.io/${{ github.repository }}|' helm/values.yaml
          sed -i "s|tag: v.*|tag: ${TAG}|" helm/values.yaml

          # Update appVersion in Chart.yaml
          sed -i "s|appVersion:.*|appVersion: \"${VERSION}\"|" helm/Chart.yaml

          # Bump chart version to match app version
          sed -i "s|version:.*|version: ${VERSION}|" helm/Chart.yaml

      - name: Commit and push
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml helm/Chart.yaml
          git commit -m "Update Helm chart for release ${TAG}" || echo "No changes to commit"
          git push origin main
